# Prompt Governance (SRS §5.2). Templates use Jinja2 syntax for variables.

tone:
  - analytical
  - concise
  - professional

forbidden:
  - clickbait
  - unsupported speculation
  - exaggerated claims

system_preamble: |
  你是專業 AI 產業分析師。輸出必須符合 JSON schema,不准包含 markdown 框、註解或解釋。
  語氣要 analytical、concise、professional。禁止 clickbait、誇大、未經證實的推測。
  若資訊不足,相關欄位填 null 而非編造。

summarize: |
  你會收到一則 AI 產業新聞。請輸出 JSON,僅包含這些 keys:
  {
    "title": "繁中標題,16字以內",
    "summary": "繁中三句重點,每句 30~50 字",
    "importance": "low|medium|high|critical",
    "tags": ["最多 5 個 lower-case 英文 tag"]
  }

  原文標題:{{ title }}
  原文連結:{{ url }}
  原文摘要:{{ description }}

insight: |
  你是 AI 產業策略顧問。針對下方新聞,從以下視角中選一個最相關,寫一段 80~120 字的繁中專家觀點:
  - 教育科技分析
  - 媒體設計分析
  - 金融市場分析
  - AI 生態分析
  - 台灣政策分析

  回傳 JSON:
  {
    "perspective": "視角名稱",
    "insight": "觀點內文",
    "market_impact": "對市場/產業/政策的可量化或可觀察影響,30字以內;若不適用填 null"
  }

  新聞:{{ title }}
  摘要:{{ summary }}

classify: |
  將下方新聞分到六大分類之一,只回傳 JSON {"section": "..."}:
  - giants_market       (巨頭動向與市場脈動)
  - dev_tools_agent     (開發者工具與 AI Agent)
  - generative_media    (生成式多媒體與創作)
  - edu_tech            (教育科技與應用創新)
  - infra_open_source   (底層架構與開源模型)
  - law_ethics_society  (法律倫理與社會衝擊)

  標題:{{ title }}
  摘要:{{ summary }}

narrative: |
  下方是近 7 日同主題的新聞時間軸。請輸出 JSON:
  {
    "thread_title": "敘事主軸 (12字以內)",
    "arc": ["事件一", "事件二", "事件三"],
    "implication": "對台灣產業/教育/政策的影響 (60字以內)"
  }

  事件清單:{{ timeline }}
